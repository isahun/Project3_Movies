<article class="movie-card">
  <img [src]="'https://image.tmdb.org/t/p/w300' + movie().poster_path" [alt]="movie().title">
  <div class="movie-info">
    <h3> {{ movie().title }}</h3>
    <span> {{ movie().release_date | date }}</span>
    <span>⭐ {{ movie().vote_average | number:'1.1-1' }}</span>
  </div>
</article>
