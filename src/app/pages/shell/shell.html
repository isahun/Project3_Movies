<section class="shell">
  <header>
  </header>

  <nav
    class="fixed top-0 w-full z-50 flex items-center justify-between px-8 py-4 bg-black/90 backdrop-blur-sm border-b border-white/10">
    <span class="text-xl font-bold text-white tracking-widest mr-5">CINEMA</span>
    <div class="flex gap-8 items-center text-sm text-gray-300">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Inici</a>
      <a routerLink="movies" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Pel·lícules</a>

      @if (authService.isLoggedIn()) {
      <a routerLink="favorites" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Favorites</a>
      <a routerLink="user-profile" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Perfil</a>

      <span>{{ authService.currentUser()?.email }}</span>
      <button class="text-red-800 hover:text-red-300 transition-colors cursor-pointer" (click)="authService.logout()">Tanca sessió</button>
      } @else {
      <a routerLink="/login" class="bg-red-700 text-white px-4 py-1.5 rounded transition-colors">Inicia sessió</a>
      }
    </div>
  </nav>

  <main>
    <router-outlet></router-outlet>
  </main>

  <footer></footer>
</section>
