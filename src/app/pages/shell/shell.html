<section class="shell m-10">
  <header>
  </header>

  <nav class="bg-black text-blue-300 text-2xl flex gap-5 p-8 justify-evenly mb-10 m-5 rounded-4xl">
    <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Inici</a>
    <a routerLink="movies" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Pel·lícules</a>

    @if (authService.isLoggedIn()) {
    <a routerLink="favorites" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Favorites</a>
    <a routerLink="user-profile" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Perfil</a>

    <span>{{ authService.currentUser()?.email }}</span>
    <button (click)="authService.logout()">Tanca sessió</button>
    } @else {
    <a routerLink="/login">Inicia sessió</a>
    }
  </nav>

  <main>
    <router-outlet></router-outlet>
  </main>

  <footer></footer>
</section>
