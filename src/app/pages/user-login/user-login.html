<section class="login mx-10 my-auto min-h-[80vh]">
  <form (ngSubmit)="onSubmit()"
    class="login-form flex flex-col gap-5 items-center justify-center bg-gray-800 p-10 rounded-3xl m-auto max-w-120">
    <h1>Benvingut/da al CINEMA</h1>

    <input class="login-input" type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
    <input class="login-input" type="password" [(ngModel)]="password" name="password" placeholder="Password" required>

    @if (error) {
    <p>{{ error }}</p>
    }

    <div class="login-btn-container flex flex-col gap-3">
      <button class="login-btn px-5 py-2.5 rounded-3xl cursor-pointer" type="submit">Entrar</button>
      <button type="button" (click)="authService.loginWithGoogle()"
        class="google-login-btn flex items-center justify-center gap-3 bg-white text-gray-800 font-semibold py-2 px-3 rounded-lg transition-all cursor-pointer">
        <img src="https://www.google.com/favicon.ico" class="w-4 h-4" alt="Google" />
        Continua amb Google
      </button>
      <a routerLink="/register" class="register-link text-center hover:underline cursor-pointer text-sm">No tens compte?
        Registra't</a>
      <a routerLink="/" class="home-link text-center rounded-3xl p-2 mt-10 hover:underline cursor-pointer">Torna a l'inici</a>
    </div>
  </form>
</section>
