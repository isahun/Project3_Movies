<section class="movies-list px-6 py-8 max-w-7xl mx-auto">
  <app-search-tool></app-search-tool>

  <ul class="movies-list grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mt-6">
    @for (movie of filteredMovies(); track movie.id) {
    <app-movie-card [movie]="movie"></app-movie-card>
    }
  </ul>

  <nav class="pagination flex justify-center gap-6 mt-8 text-gray-400">
    <button (click)="moviesService.prevPage()" [disabled]="moviesService.currentPage() === 1"
      class="pag-btn bg-black p-3 rounded-3xl cursor-pointer hover:text-white hover:scale-1.2  transition-colors ">
      ← Anterior
    </button>

    <span class="text-white p-3">Pàgina {{ moviesService.currentPage() }}</span>

    <button (click)="moviesService.nextPage()"
      class="pag-btn bg-black p-3 rounded-3xl cursor-pointer hover:text-white hover:scale-1.2  transition-colors ">
      Següent →
    </button>
  </nav>
</section>
