<section class="movies-list flex flex-col gap-10 m-5 p-10">
  <app-search-tool></app-search-tool>

  <ul class="movies-list flex flex-col gap-5">
    @for (movie of filteredMovies(); track movie.id) {
    <app-movie-card [movie]="movie"></app-movie-card>
    }
  </ul>

  <nav class="pagination">
    <button (click)="moviesService.prevPage()">
      ← Anterior
    </button>

    <span>Pàgina {{ moviesService.currentPage() }}</span>

    <button (click)="moviesService.nextPage()">
      Següent →
    </button>
  </nav>
</section>
